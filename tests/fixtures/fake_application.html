<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fake Application</title>
</head>
<body>
  <form id="application-form">
    <label for="first_name">First name</label>
    <input id="first_name" name="first_name" type="text">

    <label for="last_name">Last name</label>
    <input id="last_name" name="last_name" type="text">

    <label for="email">Email address</label>
    <input id="email" name="email" type="email">

    <label for="phone">Mobile phone</label>
    <input id="phone" name="phone" type="tel">

    <label for="school">High school</label>
    <input id="school" name="school" type="text">

    <label for="education">Highest education level</label>
    <select id="education" name="education">
      <option value="">Choose one</option>
      <option>Middle school</option>
      <option>High school</option>
      <option>College</option>
    </select>

    <label for="intro">Why are you interested in this job?</label>
    <textarea id="intro" name="intro"></textarea>

    <fieldset>
      <legend>Do you have reliable transportation?</legend>
      <label><input name="transportation" type="radio" value="yes"> Yes</label>
      <label><input name="transportation" type="radio" value="no"> No</label>
    </fieldset>

    <label><input id="terms" name="terms" type="checkbox"> I agree that my application is accurate.</label>

    <label for="ssn">Social Security Number</label>
    <input id="ssn" name="ssn" type="text">

    <input id="submitted" name="submitted" type="hidden" value="no">
    <button type="submit" onclick="document.getElementById('submitted').value='yes'">Submit application</button>
  </form>
</body>
</html>
