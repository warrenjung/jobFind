<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Multi-select question</title></head>
<body>
  <form>
    <fieldset>
      <legend>How many shifts per week are you looking to work (we require a minimum of 3 shifts per week)? *</legend>
      <label><input type="checkbox" name="shifts" value="3"> 3</label>
      <label><input type="checkbox" name="shifts" value="4"> 4</label>
      <label><input type="checkbox" name="shifts" value="5"> 5</label>
    </fieldset>
    <label for="email">Email address</label>
    <input id="email" name="email" type="email">
  </form>
</body>
</html>
